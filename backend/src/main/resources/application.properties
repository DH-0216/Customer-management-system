# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mariadb://localhost:3306/customer_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDB106Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.open-in-view=false

# ── SQL initialisation ───────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql
spring.sql.init.continue-on-error=true

# ── Multipart (large Excel uploads) ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=250MB

# ── Async executor ───────────────────────────────────────────────────────────
app.async.core-pool-size=3
app.async.max-pool-size=5
app.async.queue-capacity=10

# ── Batch insert size ────────────────────────────────────────────────────────
app.bulk.batch-size=500

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080
